name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update stdlib
        run: moon update

      - name: Check formatting
        run: moon fmt --check

      - name: Build
        run: moon build

      - name: Test (wasm-gc)
        run: moon test --target wasm-gc

      - name: Test (js)
        run: moon test --target js

      - name: Test (native)
        run: moon test --target native
